<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoxTrack Bridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        zinc: {
                            950: '#09090b', 900: '#101012', 800: '#17171a',
                            700: '#1f2023', 600: '#2c2d31', 500: '#3e4046',
                            400: '#5b5d63', 300: '#7a7c82', 200: '#9a9ca2',
                            100: '#bcbec4', 50: '#e3e4e6'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
        input::placeholder, select::placeholder { color: #3e4046; }
        select option { background: #17171a; color: #e3e4e6; }
        .toast { animation: slideIn 0.3s ease; }
        @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
        .list-row { transition: background 0.15s ease; }
        .list-row:hover { background: #17171a; }
        .instruction-box { transition: all 0.2s ease; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

    <div id="toast" class="fixed top-4 right-4 z-50 hidden">
        <div id="toastMsg" class="toast px-5 py-3 rounded-xl text-sm font-medium shadow-xl border"></div>
    </div>

    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="bg-zinc-900 border-b border-zinc-800 py-3 px-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="/logo.png" alt="FoxTrack" class="h-8 w-auto">
                <h1 class="text-xl font-bold tracking-tight">FoxTrack Bridge</h1>
            </div>
            <div class="flex items-center gap-3">
                <span id="bridgeStatus" class="flex items-center gap-2 text-sm text-zinc-400">
                    <span class="w-2 h-2 rounded-full bg-zinc-600 pulse"></span> Connecting…
                </span>
                <a href="https://github.com/FoxnTrain/FoxTrack-Bridge" target="_blank"
                   class="flex items-center gap-1.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 hover:text-white px-3 py-1 rounded-full text-xs font-semibold tracking-wide transition-colors">
                    <i class="fab fa-github"></i> GitHub
                </a>
            </div>
        </header>

        <main class="flex-grow p-6">
            <div class="max-w-3xl mx-auto space-y-5">

                <!-- FoxTrack Connection -->
                <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
                    <h2 class="text-base font-semibold mb-1 flex items-center gap-2">
                        <i class="fas fa-key text-orange-500"></i> FoxTrack Connection
                    </h2>
                    <p class="text-zinc-500 text-xs mb-5">Copy your API key from FoxTrack → Settings → Integrations → 3D Printer Integration</p>
                    <div class="flex gap-3 items-end">
                        <div class="flex-1">
                            <label class="block text-zinc-400 text-xs font-medium mb-2 uppercase tracking-wide">API Key</label>
                            <input type="password" id="apiKey" autocomplete="off"
                                class="w-full bg-zinc-950 border border-zinc-800 text-zinc-100 rounded-xl px-4 py-2.5 text-sm focus:ring-1 focus:ring-orange-500 focus:border-orange-500 outline-none"
                                placeholder="Paste your FoxTrack API key">
                        </div>
                        <button onclick="saveGlobalConfig()"
                            class="bg-orange-500 hover:bg-orange-600 active:bg-orange-700 text-white font-semibold px-5 py-2.5 rounded-xl text-sm transition-colors flex-shrink-0">
                            Save
                        </button>
                    </div>
                    <div id="connectionStatus" class="mt-3 hidden">
                        <span id="connectionStatusText" class="text-xs"></span>
                    </div>
                </div>

                <!-- Add Printer -->
                <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
                    <h2 class="text-base font-semibold mb-1 flex items-center gap-2">
                        <i class="fas fa-plus-circle text-orange-500"></i> Add Printer
                    </h2>
                    <p class="text-zinc-500 text-xs mb-5">Connect a printer on your local network to FoxTrack</p>

                    <!-- Brand selector -->
                    <div class="mb-5">
                        <label class="block text-zinc-400 text-xs font-medium mb-2 uppercase tracking-wide">Printer Brand</label>
                        <select id="pBrand" onchange="onBrandChange()"
                            class="w-full bg-zinc-950 border border-zinc-800 text-zinc-100 rounded-xl px-4 py-2.5 text-sm focus:ring-1 focus:ring-orange-500 focus:border-orange-500 outline-none appearance-none cursor-pointer">
                            <option value="">Select brand…</option>
                            <option value="bambu">BambuLab</option>
                            <option value="creality">Creality (Beta)</option>
                            <option value="prusa">Prusa (Beta)</option>
                        </select>
                    </div>

                    <!-- Brand instructions -->
                    <div id="brandInstructions" class="hidden instruction-box mb-5"></div>

                    <!-- Printer fields -->
                    <div id="printerFields" class="hidden">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                            <div>
                                <label class="block text-zinc-400 text-xs font-medium mb-2 uppercase tracking-wide">Printer Name</label>
                                <input type="text" id="pName" autocomplete="off"
                                    class="w-full bg-zinc-950 border border-zinc-800 text-zinc-100 rounded-xl px-4 py-2.5 text-sm focus:ring-1 focus:ring-orange-500 focus:border-orange-500 outline-none"
                                    placeholder="e.g. Watson">
                            </div>
                            <div>
                                <label class="block text-zinc-400 text-xs font-medium mb-2 uppercase tracking-wide">IP Address</label>
                                <input type="text" id="pIp" autocomplete="off"
                                    class="w-full bg-zinc-950 border border-zinc-800 text-zinc-100 rounded-xl px-4 py-2.5 text-sm focus:ring-1 focus:ring-orange-500 focus:border-orange-500 outline-none"
                                    placeholder="192.168.1.100">
                            </div>
                            <!-- BambuLab-only fields -->
                            <div id="fieldSerial">
                                <label class="block text-zinc-400 text-xs font-medium mb-2 uppercase tracking-wide">
                                    Serial Number
                                    <span class="ml-1 text-zinc-600 normal-case cursor-help" title="Settings → Device Info on the printer screen">(?)</span>
                                </label>
                                <input type="text" id="pSerial" autocomplete="off"
                                    class="w-full bg-zinc-950 border border-zinc-800 text-zinc-100 rounded-xl px-4 py-2.5 text-sm font-mono focus:ring-1 focus:ring-orange-500 focus:border-orange-500 outline-none"
                                    placeholder="01P00A…">
                            </div>
                            <div id="fieldLanCode">
                                <label class="block text-zinc-400 text-xs font-medium mb-2 uppercase tracking-wide">
                                    LAN Access Code
                                    <span class="ml-1 text-zinc-600 normal-case cursor-help" title="Bambu app → Device → LAN Mode">(?)</span>
                                </label>
                                <input type="password" id="pLanCode" autocomplete="off"
                                    class="w-full bg-zinc-950 border border-zinc-800 text-zinc-100 rounded-xl px-4 py-2.5 text-sm font-mono focus:ring-1 focus:ring-orange-500 focus:border-orange-500 outline-none"
                                    placeholder="8-character code">
                            </div>
                            <!-- Prusa-only fields -->
                            <div id="fieldPrusaKey" class="hidden">
                                <label class="block text-zinc-400 text-xs font-medium mb-2 uppercase tracking-wide">
                                    PrusaLink API Key
                                    <span class="ml-1 text-zinc-600 normal-case cursor-help" title="PrusaLink web interface → Settings → API Key">(?)</span>
                                </label>
                                <input type="password" id="pPrusaKey" autocomplete="off"
                                    class="w-full bg-zinc-950 border border-zinc-800 text-zinc-100 rounded-xl px-4 py-2.5 text-sm font-mono focus:ring-1 focus:ring-orange-500 focus:border-orange-500 outline-none"
                                    placeholder="PrusaLink API key">
                            </div>
                        </div>

                        <!-- Test connection + Add buttons -->
                        <div class="flex items-center gap-3 flex-wrap">
                            <button onclick="testConnection()"
                                class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-200 font-semibold px-4 py-2 rounded-xl text-sm transition-colors">
                                <i class="fas fa-plug text-xs"></i> Test Connection
                            </button>
                            <button onclick="addPrinter()"
                                class="flex items-center gap-2 bg-orange-500 hover:bg-orange-600 active:bg-orange-700 text-white font-semibold px-5 py-2 rounded-xl text-sm transition-colors">
                                <i class="fas fa-plus text-xs"></i> Connect
                            </button>
                            <span id="testResult" class="text-xs hidden"></span>
                        </div>
                    </div>
                </div>

                <!-- Printers list -->
                <div>
                    <h2 class="text-base font-semibold mb-3 flex items-center gap-2">
                        <i class="fas fa-print text-orange-500"></i> Printers
                        <span id="printerCount" class="bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded-full text-xs">0</span>
                    </h2>
                    <div id="printersList" class="bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden"></div>
                </div>

            </div>
        </main>

        <footer class="bg-zinc-900 border-t border-zinc-800 py-3 px-6 text-center text-zinc-600 text-xs">
            FoxTrack Bridge v1.2 — 3D Printer Integration
        </footer>
    </div>

<script>
let configuredPrinters = [];
let liveStatus = {};

// ─── Brand config ─────────────────────────────────────────────────────────────
const brands = {
    bambu: {
        instructions: `
            <div class="bg-zinc-950 border border-zinc-800 rounded-xl p-4 space-y-3">
                <p class="text-sm font-medium text-zinc-200 flex items-center gap-2">
                    <i class="fas fa-info-circle text-orange-500"></i> BambuLab Setup Required
                </p>
                <div class="space-y-2 text-xs text-zinc-400">
                    <div class="flex items-start gap-2">
                        <span class="text-orange-500 font-bold mt-0.5">1</span>
                        <span>On the printer touchscreen: <strong class="text-zinc-300">Settings → Network → LAN Only Mode</strong> — toggle it on</span>
                    </div>
                    <div class="flex items-start gap-2">
                        <span class="text-orange-500 font-bold mt-0.5">2</span>
                        <span>Scroll down and enable <strong class="text-zinc-300">Developer Mode</strong> — required for local MQTT access on newer firmware</span>
                    </div>
                    <div class="flex items-start gap-2">
                        <span class="text-orange-500 font-bold mt-0.5">3</span>
                        <span><strong class="text-zinc-300">Serial Number</strong>: Settings → Device Info on the printer screen</span>
                    </div>
                    <div class="flex items-start gap-2">
                        <span class="text-orange-500 font-bold mt-0.5">4</span>
                        <span><strong class="text-zinc-300">LAN Access Code</strong>: Settings → WiFi → Device Info on the printer screen</span>
                    </div>
                </div>
            </div>`,
        fields: { serial: true, lanCode: true, prusaKey: false }
    },
    creality: {
        instructions: `
            <div class="bg-zinc-950 border border-amber-800/40 rounded-xl p-4 space-y-3">
                <p class="text-sm font-medium text-zinc-200 flex items-center gap-2">
                    <span class="bg-amber-500/20 text-amber-400 text-xs px-2 py-0.5 rounded-full font-semibold">BETA</span>
                    Creality Setup — Klipper-based Printers
                </p>
                <div class="space-y-2 text-xs text-zinc-400">
                    <div class="flex items-start gap-2">
                        <span class="text-amber-400 font-bold mt-0.5">✓</span>
                        <span><strong class="text-zinc-300">Supported models:</strong> K1, K1C, K1 Max, K1 SE, K2 Plus, Ender-3 V3 series, Ender-5 S1, CR-10 SE, SparkX series, and any Creality printer running Klipper with Moonraker</span>
                    </div>
                    <div class="flex items-start gap-2">
                        <span class="text-amber-400 font-bold mt-0.5">1</span>
                        <span>Your printer must be on the same local network as this computer</span>
                    </div>
                    <div class="flex items-start gap-2">
                        <span class="text-amber-400 font-bold mt-0.5">2</span>
                        <span>Find the printer's IP address on the touchscreen: <strong class="text-zinc-300">Settings → Network → IP Address</strong></span>
                    </div>
                    <div class="flex items-start gap-2">
                        <span class="text-amber-400 font-bold mt-0.5">3</span>
                        <span>These printers use the Moonraker API — no access code needed, just the IP address</span>
                    </div>
                </div>
            </div>`,
        fields: { serial: false, lanCode: false, prusaKey: false }
    },
    prusa: {
        instructions: `
            <div class="bg-zinc-950 border border-amber-800/40 rounded-xl p-4 space-y-3">
                <p class="text-sm font-medium text-zinc-200 flex items-center gap-2">
                    <span class="bg-amber-500/20 text-amber-400 text-xs px-2 py-0.5 rounded-full font-semibold">BETA</span>
                    Prusa Setup — MK4 / XL / Mini (PrusaLink)
                </p>
                <div class="space-y-2 text-xs text-zinc-400">
                    <div class="flex items-start gap-2">
                        <span class="text-amber-400 font-bold mt-0.5">1</span>
                        <span>Make sure <strong class="text-zinc-300">PrusaLink</strong> is enabled on your printer — it's on by default on MK4, XL, and Mini</span>
                    </div>
                    <div class="flex items-start gap-2">
                        <span class="text-amber-400 font-bold mt-0.5">2</span>
                        <span>Find the printer IP on the touchscreen: <strong class="text-zinc-300">Settings → Network → IP Address</strong></span>
                    </div>
                    <div class="flex items-start gap-2">
                        <span class="text-amber-400 font-bold mt-0.5">3</span>
                        <span>Get your API key: open <strong class="text-zinc-300">http://[printer-ip]</strong> in a browser → Settings → API Key</span>
                    </div>
                    <div class="flex items-start gap-2">
                        <span class="text-amber-500 font-bold mt-0.5">!</span>
                        <span class="text-amber-400/80">MK3 and older models are not directly supported.</span>
                    </div>
                </div>
            </div>`,
        fields: { serial: false, lanCode: false, prusaKey: true }
    }
};

// ─── Brand change handler ─────────────────────────────────────────────────────
function onBrandChange() {
    const brand = document.getElementById('pBrand').value;
    const instructionsEl = document.getElementById('brandInstructions');
    const fieldsEl = document.getElementById('printerFields');
    const testResult = document.getElementById('testResult');

    testResult.classList.add('hidden');

    if (!brand) {
        instructionsEl.classList.add('hidden');
        fieldsEl.classList.add('hidden');
        return;
    }

    const cfg = brands[brand];
    instructionsEl.innerHTML = cfg.instructions;
    instructionsEl.classList.remove('hidden');
    fieldsEl.classList.remove('hidden');

    document.getElementById('fieldSerial').style.display   = cfg.fields.serial   ? '' : 'none';
    document.getElementById('fieldLanCode').style.display  = cfg.fields.lanCode  ? '' : 'none';
    // Prusa key: must also remove the 'hidden' tailwind class
    const prusaKeyEl = document.getElementById('fieldPrusaKey');
    if (cfg.fields.prusaKey) {
        prusaKeyEl.classList.remove('hidden');
        prusaKeyEl.style.display = '';
    } else {
        prusaKeyEl.classList.add('hidden');
        prusaKeyEl.style.display = 'none';
    }
}

// ─── Test connection ──────────────────────────────────────────────────────────
async function testConnection() {
    const ip    = document.getElementById('pIp').value.trim();
    const brand = document.getElementById('pBrand').value;
    const result = document.getElementById('testResult');

    if (!ip) {
        toast('Enter an IP address first', 'error');
        return;
    }

    result.className = 'text-xs text-zinc-400';
    result.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-1"></i> Testing…';
    result.classList.remove('hidden');

    try {
        const res = await fetch('/api/test', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ip, brand })
        });
        const data = await res.json();

        if (data.reachable) {
            result.className = 'text-xs text-emerald-400';
            result.innerHTML = '<i class="fas fa-check-circle mr-1"></i> Printer reachable at ' + escHtml(ip);
        } else {
            result.className = 'text-xs text-red-400';
            result.innerHTML = '<i class="fas fa-times-circle mr-1"></i> Cannot reach printer — check IP and network';
        }
    } catch (e) {
        // Fallback: simple ping-style check via the backend may not exist yet
        result.className = 'text-xs text-zinc-500';
        result.innerHTML = '<i class="fas fa-info-circle mr-1"></i> Test endpoint not available — try connecting directly';
    }
}

// ─── Toast ───────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
    const el = document.getElementById('toastMsg');
    const wrap = document.getElementById('toast');
    const colors = {
        success: 'bg-emerald-900/80 border-emerald-700 text-emerald-300',
        error:   'bg-red-900/80 border-red-700 text-red-300',
        info:    'bg-zinc-800 border-zinc-700 text-zinc-300',
    };
    el.className = 'toast px-5 py-3 rounded-xl text-sm font-medium shadow-xl border ' + (colors[type] || colors.info);
    el.textContent = msg;
    wrap.classList.remove('hidden');
    setTimeout(() => wrap.classList.add('hidden'), 3500);
}

// ─── API ─────────────────────────────────────────────────────────────────────
async function apiFetch(url, options = {}) {
    const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...options });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
}

// ─── Load config ──────────────────────────────────────────────────────────────
async function loadConfig() {
    try {
        const cfg = await apiFetch('/api/config');
        if (cfg.api_key) document.getElementById('apiKey').value = cfg.api_key;
        configuredPrinters = cfg.printers || [];
        setBridgeStatus(true);
    } catch (e) {
        setBridgeStatus(false);
    }
}

// ─── Save settings ────────────────────────────────────────────────────────────
async function saveGlobalConfig() {
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) { toast('Please enter your API key', 'error'); return; }
    try {
        // Preserve the existing webhook_url from backend — don't overwrite it
        const current = await apiFetch('/api/config').catch(() => ({}));
        await apiFetch('/api/config', {
            method: 'POST',
            body: JSON.stringify({
                api_key:     apiKey,
                webhook_url: current.webhook_url || '',
                printers:    configuredPrinters
            }),
        });
        toast('Settings saved ✓');
    } catch (e) {
        toast('Failed to save: ' + e.message, 'error');
    }
}

// ─── Add printer ─────────────────────────────────────────────────────────────
async function addPrinter() {
    const brand   = document.getElementById('pBrand').value;
    const name    = document.getElementById('pName').value.trim();
    const ip      = document.getElementById('pIp').value.trim();
    const serial  = document.getElementById('pSerial').value.trim();
    const lanCode = document.getElementById('pLanCode').value.trim();

    if (!brand)  { toast('Please select a printer brand', 'error'); return; }
    if (!name)   { toast('Please enter a printer name', 'error'); return; }
    if (!ip)     { toast('Please enter the IP address', 'error'); return; }

    if (brand === 'bambu') {
        if (!serial)  { toast('Serial number required — Settings → Device Info on the printer screen', 'error'); return; }
        if (!lanCode) { toast('LAN access code required — Bambu app → Device → LAN Mode', 'error'); return; }
    }

    try {
        await apiFetch('/api/printers', {
            method: 'POST',
            body: JSON.stringify({ name, ip, serial, lan_code: lanCode, brand }),
        });
        ['pName','pIp','pSerial','pLanCode'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('pBrand').value = '';
        document.getElementById('brandInstructions').classList.add('hidden');
        document.getElementById('printerFields').classList.add('hidden');
        document.getElementById('testResult').classList.add('hidden');
        toast('Connecting to ' + name + '…', 'info');
        await loadConfig();
        renderPrinters();
    } catch (e) {
        toast('Failed to add printer: ' + e.message, 'error');
    }
}

// ─── Remove printer ───────────────────────────────────────────────────────────
async function removePrinter(name) {
    if (!confirm('Remove "' + name + '" from FoxTrack Bridge?')) return;
    try {
        const cfg = await apiFetch('/api/config');
        cfg.printers = (cfg.printers || []).filter(p => p.name !== name);
        await apiFetch('/api/config', { method: 'POST', body: JSON.stringify(cfg) });
        configuredPrinters = cfg.printers;
        toast(name + ' removed', 'info');
        renderPrinters();
    } catch (e) {
        toast('Failed to remove: ' + e.message, 'error');
    }
}

// ─── Render printers ──────────────────────────────────────────────────────────
function renderPrinters() {
    const list  = document.getElementById('printersList');
    const count = document.getElementById('printerCount');
    count.textContent = configuredPrinters.length;

    if (configuredPrinters.length === 0) {
        list.innerHTML = `
            <div class="p-10 text-center">
                <i class="fas fa-print text-zinc-700 text-3xl mb-3 block"></i>
                <p class="text-zinc-500 text-sm">No printers connected yet.<br>Add your first printer above.</p>
            </div>`;
        return;
    }

    list.innerHTML = configuredPrinters.map((p, i) => printerRow(p, i, configuredPrinters.length)).join('');
}

function printerRow(printer, index, total) {
    const live   = liveStatus[printer.name];
    const status = live ? live.status : 'connecting';
    const file   = live ? (live.file_name || '—') : '—';
    const pct    = live ? (live.progress || 0) : 0;
    const err    = live ? (live.error || '') : '';
    const brand  = printer.brand || 'bambu';

    const brandIcon = {
        bambu:    '<span class="text-zinc-600 text-xs">BambuLab</span>',
        creality: '<span class="text-amber-600 text-xs">Creality <span class="text-amber-700">β</span></span>',
        prusa:    '<span class="text-amber-600 text-xs">Prusa <span class="text-amber-700">β</span></span>',
    }[brand] || '';

    const statusConfig = {
        printing:     { dot: 'bg-orange-400 pulse', label: 'Printing',     text: 'text-orange-400'  },
        idle:         { dot: 'bg-emerald-400',       label: 'Idle',         text: 'text-emerald-400' },
        paused:       { dot: 'bg-yellow-400 pulse',  label: 'Paused',       text: 'text-yellow-400'  },
        finished:     { dot: 'bg-blue-400',           label: 'Finished',     text: 'text-blue-400'    },
        error:        { dot: 'bg-red-400 pulse',      label: 'Error',        text: 'text-red-400'     },
        connected:    { dot: 'bg-zinc-500 pulse',     label: 'Connecting…',  text: 'text-zinc-400'    },
        connecting:   { dot: 'bg-zinc-500 pulse',     label: 'Connecting…',  text: 'text-zinc-400'    },
        disconnected: { dot: 'bg-red-800',            label: 'Offline',      text: 'text-red-500'     },
    };
    const sc = statusConfig[status] || statusConfig.connecting;
    const border = index < total - 1 ? 'border-b border-zinc-800' : '';

    const progressBar = status === 'printing' ? `
        <div class="w-24 bg-zinc-800 rounded-full h-1.5 hidden sm:block">
            <div class="h-1.5 rounded-full bg-orange-500 transition-all duration-500" style="width:${pct}%"></div>
        </div>
        <span class="text-zinc-400 text-xs w-8 text-right hidden sm:block">${pct}%</span>` : `
        <div class="w-24 hidden sm:block"></div>
        <span class="w-8 hidden sm:block"></span>`;

    return `
    <div class="list-row ${border} px-5 py-4 flex items-center gap-4">
        <div class="flex items-center gap-3 min-w-0 flex-1">
            <span class="w-2.5 h-2.5 rounded-full flex-shrink-0 ${sc.dot}"></span>
            <div class="min-w-0">
                <p class="font-medium text-sm truncate">${escHtml(printer.name)}</p>
                <div class="flex items-center gap-2">
                    <p class="text-zinc-500 text-xs font-mono">${escHtml(printer.ip)}</p>
                    ${brandIcon}
                </div>
            </div>
        </div>
        <span class="text-xs font-medium ${sc.text} w-24 flex-shrink-0 hidden sm:block">${sc.label}</span>
        <span class="text-zinc-400 text-xs truncate flex-1 hidden md:block" title="${escHtml(file)}">${escHtml(file)}</span>
        ${progressBar}
        ${err ? `<span class="text-xs text-red-400 bg-red-900/20 border border-red-800/30 px-2 py-0.5 rounded-full flex-shrink-0 hidden lg:block"><i class="fas fa-exclamation-triangle mr-1"></i>Error</span>` : '<span class="w-0 hidden lg:block"></span>'}
        <button onclick="removePrinter('${escHtml(printer.name)}')"
            class="flex-shrink-0 text-zinc-600 hover:text-red-400 transition-colors p-1 rounded-lg hover:bg-red-500/10"
            title="Remove ${escHtml(printer.name)}">
            <i class="fas fa-trash text-xs"></i>
        </button>
    </div>`;
}

function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Poll status ──────────────────────────────────────────────────────────────
async function pollStatus() {
    try {
        liveStatus = await apiFetch('/api/status');
        setBridgeStatus(true);
        renderPrinters();
    } catch (e) {
        setBridgeStatus(false);
    }
}

function setBridgeStatus(online) {
    const el = document.getElementById('bridgeStatus');
    if (online) {
        el.innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-500"></span> <span class="text-emerald-400">Bridge running</span>';
    } else {
        el.innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500 pulse"></span> <span class="text-red-400">Bridge offline</span>';
    }
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
(async () => {
    await loadConfig();
    renderPrinters();
    await pollStatus();
    setInterval(pollStatus, 5000);
})();
</script>
</body>
</html>
