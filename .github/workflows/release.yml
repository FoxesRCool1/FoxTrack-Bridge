name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: windows-latest
            goos: windows
            goarch: amd64
            asset: FoxTrack-Bridge-Windows.exe

          - os: macos-intel
            runner: macos-latest
            goos: darwin
            goarch: amd64
            label: Intel
            asset: FoxTrack-Bridge-macOS-Intel.zip

          - os: macos-arm
            runner: macos-latest
            goos: darwin
            goarch: arm64
            label: Apple-Silicon
            asset: FoxTrack-Bridge-macOS-Apple-Silicon.zip

          - os: linux
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            asset: FoxTrack-Bridge-Linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install Linux system dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing gcc libgtk-3-dev libayatana-appindicator3-dev

      - name: Build (Windows)
        if: matrix.goos == 'windows'
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w -H windowsgui" -o FoxTrack-Bridge-Windows.exe .

      - name: Build (macOS)
        if: matrix.goos == 'darwin'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          go build -ldflags="-s -w" -o foxtrack-bridge-bin .

          # Build .app bundle
          APP_DIR="FoxTrack Bridge.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp foxtrack-bridge-bin "$APP_DIR/Contents/MacOS/foxtrack-bridge"
          chmod +x "$APP_DIR/Contents/MacOS/foxtrack-bridge"

          cat > "$APP_DIR/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>foxtrack-bridge</string>
            <key>CFBundleIdentifier</key>
            <string>studio.foxtrack.bridge</string>
            <key>CFBundleName</key>
            <string>FoxTrack Bridge</string>
            <key>CFBundleDisplayName</key>
            <string>FoxTrack Bridge</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          # Ad-hoc sign
          codesign --deep --force --sign "-" "$APP_DIR"

          # Zip preserving permissions
          zip -r "${{ matrix.asset }}" "$APP_DIR" --quiet

      - name: Build (Linux)
        if: matrix.goos == 'linux'
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w" -o FoxTrack-Bridge-Linux .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
